<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Research Studio</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260428-agent-modes" />
  </head>
  <body>
    <div class="app-shell" id="app-shell">
      <aside class="sidebar">
        <div class="sidebar-viewport">
          <div class="sidebar-top">
            <div class="brand">
              <div class="brand-mark">RS</div>
              <span>Research Studio</span>
            </div>
            <div class="nav-stack">
              <button class="nav-button primary" id="new-session-button" type="button">
                <span class="nav-icon">+</span>
                <span>新对话</span>
              </button>
              <button class="nav-button" id="asset-toggle-button" type="button">
                <span class="nav-icon">□</span>
                <span>资产</span>
              </button>
            </div>
          </div>

          <div class="sidebar-section">
            <div class="sidebar-section-title">最近</div>
            <div class="session-list" id="session-list"></div>
          </div>
        </div>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <div class="topbar-title" id="chat-title">新对话</div>
          <button class="topbar-menu" type="button" aria-label="更多">···</button>
        </header>

        <section class="chat-stream" id="chat-stream"></section>

        <section class="composer-shell">
          <form class="composer-card" id="composer-form">
            <textarea
              id="composer-query"
              name="query"
              rows="1"
              placeholder="给我一个任务，或继续当前对话"
            ></textarea>
            <div class="composer-footer">
              <div class="composer-left">
                <div class="composer-hint" id="sequence-hint">下一轮 #1</div>
                <label class="agent-toggle">
                  <input id="plan-solve-mode-toggle" type="radio" name="agent-mode" value="plan_and_solve" checked />
                  <span>Plan-and-Solve Agent</span>
                </label>
                <label class="agent-toggle">
                  <input id="lats-mode-toggle" type="radio" name="agent-mode" value="lats_agent" />
                  <span>LATS Agent</span>
                </label>
              </div>
              <button class="send-button" id="composer-submit" type="submit" aria-label="发送">
                <span>↑</span>
              </button>
            </div>
          </form>
        </section>
      </main>

      <div class="asset-backdrop" id="asset-backdrop" hidden></div>
      <aside class="asset-drawer" id="asset-drawer" hidden>
        <div class="asset-drawer-header">
          <div>
            <div class="drawer-label">资产</div>
            <h2>知识资产</h2>
          </div>
          <button class="drawer-close" id="asset-close-button" type="button">关闭</button>
        </div>

        <form class="panel-card asset-form" id="asset-form">
          <input type="hidden" name="asset_id" />
          <label class="field">
            <span>标题</span>
            <input name="title" maxlength="120" required placeholder="例如：强化学习课程笔记" />
          </label>
          <label class="field">
            <span>类型</span>
            <select name="asset_type">
              <option value="note">笔记</option>
              <option value="markdown">Markdown</option>
              <option value="paper">论文</option>
              <option value="pdf">PDF</option>
              <option value="course">课件</option>
              <option value="doc">文档</option>
              <option value="code">代码</option>
            </select>
          </label>
          <label class="field">
            <span>内容</span>
            <textarea name="content" rows="7" required placeholder="直接粘贴文本内容"></textarea>
          </label>
          <div class="form-actions">
            <button class="ghost-button" id="asset-reset" type="button">清空</button>
            <button class="dark-button" type="submit">保存资产</button>
          </div>
        </form>

        <form class="panel-card asset-form" id="asset-upload-form">
          <div class="drawer-label">引入文档</div>
          <label class="field">
            <span>标题</span>
            <input name="upload_title" maxlength="120" placeholder="可选，不填则使用文件名" />
          </label>
          <label class="field">
            <span>类型</span>
            <select name="asset_type">
              <option value="doc">文档</option>
              <option value="markdown">Markdown</option>
              <option value="pdf">PDF</option>
              <option value="paper">论文</option>
              <option value="note">笔记</option>
              <option value="course">课件</option>
            </select>
          </label>
          <label class="field">
            <span>文件</span>
            <input name="file" type="file" accept=".txt,.md,.markdown,.pdf" />
          </label>
          <div class="upload-progress" id="asset-upload-progress"></div>
          <button class="dark-button" type="submit">导入文件</button>
        </form>

        <div class="asset-library">
          <div class="drawer-label">已保存资产</div>
          <div class="asset-list" id="asset-list"></div>
        </div>
      </aside>
    </div>

    <script src="/static/app.js?v=20260428-agent-modes"></script>
  </body>
</html>
